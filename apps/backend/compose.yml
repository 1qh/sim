name: sim
networks:
  internal:
    driver: bridge
    internal: false
volumes:
  postgres-data:
  convex-data:
services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: convex
      POSTGRES_DB: sim_self_hosted
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [internal]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U convex -d sim_self_hosted']
      interval: 10s
      timeout: 5s
      retries: 12
  convex-backend:
    image: ghcr.io/get-convex/convex-backend:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      INSTANCE_NAME: sim-self-hosted
      INSTANCE_SECRET: ${INSTANCE_SECRET}
      DB_PASSWORD: ${DB_PASSWORD}
      POSTGRES_URL: ${POSTGRES_URL}
      DISABLE_BEACON: 'true'
      CONVEX_CLOUD_ORIGIN: ${CONVEX_CLOUD_ORIGIN}
      CONVEX_SITE_ORIGIN: ${CONVEX_SITE_ORIGIN}
      DO_NOT_REQUIRE_SSL: ${DO_NOT_REQUIRE_SSL}
      RUST_LOG: ${RUST_LOG}
    volumes:
      - convex-data:/convex/data
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - '127.0.0.1:3220:3210'
      - '127.0.0.1:3221:3211'
    networks: [internal]
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3210/version']
      interval: 10s
      timeout: 5s
      retries: 12
