name: ' '
on:
  workflow_dispatch:
# Velocity-mode active per simdocs/adr/early-velocity-mode.md.
# Push + schedule triggers disabled; manual-only via workflow_dispatch.
# Trigger to re-enable: phase 18 / first external contributor / first public
# traffic / operator declares velocity-mode off / repeated lint regression.
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: sudo apt-get install -y zsh
      - uses: oven-sh/setup-bun@v2
      - run: bun action
