name: ' '
on:
  push:
  schedule:
    - cron: '0 0 * * 1'
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: sudo apt-get install -y zsh
      - uses: oven-sh/setup-bun@v2
      - run: bun action
